site_name: Ethan Agent
site_description: 个人 AI Agent - 文档
site_url: https://llm011.github.io/ethan-agent/
docs_dir: docs

theme:
  name: material
  language: zh
  logo: images/logo-sidebar.png
  favicon: images/icon-32.png
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.view

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - 首页: README.md
  - 入门:
    - 安装指南: installation.md
    - 快速上手: quickstart.md
  - 系统设计:
    - 系统架构: architecture.md
    - 模型 Provider: providers.md
    - 双轨路由: routing.md
    - Palantir 启发改进: palantir-inspired-improvements.md
  - 核心引擎:
    - Agent Loop: agent-loop.md
    - 记忆系统: memory.md
    - 心跳机制: heartbeat.md
    - Prompt Caching: caching.md
    - 后台任务: background-tasks.md
    - 语义路由器: semantic-router.md
  - 功能模块:
    - 技能系统: skills.md
    - 工具系统: tools.md
    - 调度器: scheduler.md
    - 知识库: knowledge.md
    - 模式: modes.md
  - 浏览器控制:
    - 总览与架构: browser/overview.md
    - 传输层与协议: browser/transport-protocol.md
    - 扩展内核 (CDP/AX): browser/extension-internals.md
    - 会话/并发/安全: browser/session-security.md
    - 设计决策记录: browser-control-plan.md
  - 接口层:
    - API & Web UI: interface.md
    - ACP 集成: acp.md
  - 其他:
    - 法律模式: legal-mode.md
    - 隐私政策: privacy-policy.md
    - Secrets 管理: secrets.md
