# Ethan Agent - Single Container Standalone Mode
# This compose file runs Ethan exactly as it would run when installed via pip.
# The container includes both the API server and the embedded Web UI on port 8900.

services:
  ethan-agent:
    # Use the official Python image
    image: python:3.12-slim
    container_name: ethan-agent-standalone
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      # Persist agent memory, skills, and configuration
      - ethan-standalone-data:/root/.ethan
    environment:
      # Optional: set an initial token for the Web UI
      - ETHAN_AUTH_TOKEN=${ETHAN_AUTH_TOKEN:-}
      # Optional: HTTP proxy if needed
      - ETHAN_PROXY=${ETHAN_PROXY:-}
      # Optional: auto-install skills on startup (space-separated sources or aliases,
      # e.g. "legal" → llm011/ethan-legal-skill/skills/legal-assistant).
      # Lets `docker compose up` provision the legal expert mode with zero extra commands.
      - ETHAN_INSTALL_SKILLS=${ETHAN_INSTALL_SKILLS:-}
      # Optional: point web_search at a SearXNG instance instead of DuckDuckGo.
      # Bring one up with `docker compose -f docker-compose.searxng.yml up -d`,
      # then set this to http://searxng:8080 (same network) or your own instance URL.
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-}
    # Install the package and run the server
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y curl git -qq >/dev/null 2>&1
        # Install the latest version from PyPI
        pip install --no-cache-dir --upgrade ethan-agent
        # Optionally provision skills declared via ETHAN_INSTALL_SKILLS (e.g. legal)
        for s in $$ETHAN_INSTALL_SKILLS; do ethan skill add \"$$s\" || true; done
        # Start the server (hosts both API and Web UI)
        ethan serve --port 8900
      "

volumes:
  ethan-standalone-data:
    name: ethan-standalone-data
