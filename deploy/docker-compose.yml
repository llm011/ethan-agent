# Ethan Agent — 部署用 docker-compose（CI 单容器镜像）
#
# 镜像由 GitHub Actions 构建发布（ghcr.io/llm011/ethan-agent），
# 内含 API + Web UI（同端口 8900）与 SearXNG 搜索实例。
#
# 用法：
#   cp .env.example .env   # 填入 API Key 等配置
#   docker compose pull
#   docker compose up -d
#   docker compose logs -f ethan        # 首行有 Web UI token
#
# 更新：docker compose pull && docker compose up -d

services:
  ethan:
    image: ghcr.io/llm011/ethan-agent:latest
    container_name: ethan-agent
    restart: unless-stopped
    ports:
      - "${ETHAN_PORT:-8900}:8900"
    volumes:
      - ethan-data:/root/.ethan
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - AGENT_DEFAULT_MODEL=${AGENT_DEFAULT_MODEL:-}
      - AGENT_LITE_MODEL=${AGENT_LITE_MODEL:-}
      - ETHAN_AUTH_TOKEN=${ETHAN_AUTH_TOKEN:-}
      - ETHAN_PROXY=${ETHAN_PROXY:-}
      - SEARXNG_BASE_URL=http://searxng:8080
    depends_on:
      searxng:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    container_name: ethan-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ethan-data:
    name: ethan-data
