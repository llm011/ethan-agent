# Ethan Agent — 部署用 docker-compose（单容器模式）
#
# 用法：
#   cp .env.example .env   # 填入 API Key 等配置
#   docker compose up -d
#   docker compose logs -f ethan

services:
  ethan:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ethan-agent:latest
    container_name: ethan
    restart: unless-stopped
    ports:
      - "${ETHAN_PORT:-8900}:8900"
    volumes:
      - ethan-data:/root/.ethan
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - AGENT_DEFAULT_MODEL=${AGENT_DEFAULT_MODEL:-}
      - AGENT_LITE_MODEL=${AGENT_LITE_MODEL:-}
      - ETHAN_AUTH_TOKEN=${ETHAN_AUTH_TOKEN:-}
      - ETHAN_PROXY=${ETHAN_PROXY:-}
      - SEARXNG_BASE_URL=http://searxng:8080
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  searxng:
    image: searxng/searxng:latest
    container_name: ethan-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ethan-data:
    driver: local
