# Ethan Agent — 本地运行 CI 构建的单容器镜像
# API + Web UI 同在 8900 端口，一条命令起整个服务。
#
# 用法：
#   docker compose -f docker-compose.dev.yml pull
#   docker compose -f docker-compose.dev.yml up -d
#   访问 http://localhost:8900（token 见 docker compose -f docker-compose.dev.yml logs ethan）
#
# 更新：pull && up -d

services:
  ethan:
    image: ghcr.io/llm011/ethan-agent:latest
    container_name: ethan-agent
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      # 持久化数据：记忆 / 会话 / skills / knowledge / config
      - ethan-data:/root/.ethan
    environment:
      # ── Provider（必填其一）────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      # ── 默认模型 ────────────────────────────────────────
      - AGENT_DEFAULT_MODEL=${AGENT_DEFAULT_MODEL:-}
      - AGENT_LITE_MODEL=${AGENT_LITE_MODEL:-}
      # ── Web UI 鉴权 Token（留空则用 config 生成的 admin token）──
      - ETHAN_AUTH_TOKEN=${ETHAN_AUTH_TOKEN:-}
      # ── 出网代理（不需要则留空）────────────────────────
      - ETHAN_PROXY=${ETHAN_PROXY:-}
      # ── 搜索：指向自建 SearXNG 实例（可选）──────────────
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-}

volumes:
  ethan-data:
    name: ethan-data
