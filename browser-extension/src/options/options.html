<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>Ethan Browser 设置</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
      h1 { font-size: 18px; }
      label { display: block; margin: 16px 0 4px; font-size: 13px; color: #444; }
      input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
      button { margin-top: 20px; padding: 8px 16px; border: 0; border-radius: 6px; background: #4f46e5; color: #fff; cursor: pointer; }
      #status { margin-top: 12px; font-size: 13px; color: #16a34a; min-height: 18px; }
      .hint { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
  </head>
  <body>
    <h1>Ethan Browser 设置</h1>
    <label>Ethan Server WebSocket 地址</label>
    <input id="serverUrl" placeholder="ws://localhost:8900/ws/browser" />
    <div class="hint">同机部署默认 ws://localhost:8900/ws/browser</div>
    <label>Token</label>
    <input id="token" type="password" placeholder="ethan web token" />
    <div class="hint">与 ethan 的 web token 一致</div>
    <button id="save">保存</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
