[project]
name = "ethan"
version = "0.0.1"
description = "Ethan — Personal AI Agent"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.22.1",
    "anthropic>=0.109.1",
    "apscheduler>=3.11.2",
    "fastapi>=0.136.3",
    "mcp>=1.27.2",
    "openai>=2.41.1",
    "pexpect>=4.9.0",
    "prompt-toolkit>=3.0.52",
    "pydantic-settings>=2.14.1",
    "python-multipart>=0.0.32",
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
    "sqlalchemy>=2.0.50",
    "sqlite-vec>=0.1.9",
    "typer>=0.26.7",
    "uvicorn>=0.49.0",
    "uvloop>=0.22.1",
]

[project.scripts]
ethan = "ethan.interface.cli:app"
