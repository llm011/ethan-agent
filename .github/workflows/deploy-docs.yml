name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/**"
      - "scripts/prepare-docs-static.sh"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /ethan-agent
      NEXT_PUBLIC_DOCS_BASE: /ethan-agent/docs-data
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Python (for docs JSON generation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare static docs data
        run: bash scripts/prepare-docs-static.sh

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npx next build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
