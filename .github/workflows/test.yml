name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # 0-LLM 单元测试:全部走 mock/fake provider/临时 SQLite,无网络依赖。
      # 不含 router 测试(test_routing_real_queries 等在 main 上既有 4 个失败,
      # 与 memory 无关,修复后另行纳入);不含 test_cross_session_memory.py
      # (脚本式,无 pytest 收集入口)。
      # golden dry/live/recall 评测已迁至独立仓库 llm011/ethan-memory-train-data
      # (减少主仓库体积),不在此处运行。
      - name: Run unit tests (0-LLM subset)
        run: >
          uv run pytest
          tests/test_structured_memory.py
          tests/test_extraction_wiring.py
          tests/test_memory_enhancements.py
          tests/test_dream_e2e.py
          tests/test_provider_fallback.py
          tests/test_is_local.py
          tests/test_mcp_apps.py
          -q
